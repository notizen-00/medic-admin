services:
  nuxt:
    build:
      context: .
      target: runner
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - /app/node_modules

  nuxt-prod:
    profiles: ["prod"]
    build:
      context: .
      target: runner
    ports:
      - "3000:3000"
    env_file:
      - .e